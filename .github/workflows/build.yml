name: Android CI WiFi Salvavidas

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - name: Create gradlew
      run: |
        gradle wrapper --gradle-version 8.5 --distribution-type bin
        chmod +x gradlew

    - name: Generar Keystore
      run: |
        # Usamos una clave fija de 10 caracteres para evitar errores de longitud y no depender de secretos absurdos
        keytool -genkey -v \
          -keystore app/wifisalvavidas.jks \
          -alias wifisalvavidas \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass "altea2026mx" \
          -keypass "altea2026mx" \
          -dname "CN=Gustavo Garay, OU=Altea-Garay, O=Altea-Garay, L=Garcia, S=Nuevo Leon, C=MX"

    - name: Build Release APK and AAB
      run: ./gradlew assembleRelease bundleRelease --stacktrace
      env:
        # Aquí es donde el sistema usará el secreto que SÍ importa y que ya protegiste
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Sign APK (Esquema V2/V3)
      run: |
        # Buscamos la ruta del apksigner dinámicamente para que no falle por versión
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
        $APKSIGNER sign --ks app/wifisalvavidas.jks \
          --ks-key-alias wifisalvavidas \
          --ks-pass "pass:altea2026mx" \
          --key-pass "pass:altea2026mx" \
          --out app/build/outputs/apk/release/WiFi-Salvavidas-FINAL.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Sign AAB
      run: |
        jarsigner -verbose \
          -sigalg SHA256withRSA \
          -digestalg SHA-256 \
          -keystore app/wifisalvavidas.jks \
          -storepass "altea2026mx" \
          -keypass "altea2026mx" \
          app/build/outputs/bundle/release/app-release.aab \
          wifisalvavidas

    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: WiFi-Salvavidas-APK-Instalador
        path: app/build/outputs/apk/release/WiFi-Salvavidas-FINAL.apk

    - name: Subir AAB
      uses: actions/upload-artifact@v4
      with:
        name: WiFi-Salvavidas-AAB-Tienda
        path: app/build/outputs/bundle/release/app-release.aab
